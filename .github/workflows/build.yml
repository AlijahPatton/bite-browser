name: Build Bite Browser APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Unzip project
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          unzip project.zip
          cp -r bite-apk/. .
          rm -rf bite-apk project.zip

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BiteBrowser-APK
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
